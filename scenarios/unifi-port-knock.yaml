# Complements iptables-scan-multi_ports (burst detection) by catching
# slower, methodical scanners like nmap sequential scans and masscan.

type: leaky
name: crowdsecurity/unifi-port-knock
description: "Detect sequential port scanning (port knocking/systematic reconnaissance)"
filter: "evt.Meta.log_type == 'iptables_drop' && evt.Meta.service == 'tcp'"
groupby: evt.Meta.source_ip
distinct: evt.Parsed.dst_port
capacity: 9
leakspeed: 1m
blackhole: 2m
labels:
  remediation: true
  classification:
    - attack.T1595.001
    - attack.T1046
    - attack.T1018
  behavior: "tcp:portscan"
  label: "Sequential Port Scan"
  spoofable: 3
  confidence: 2
  service: "tcp"
